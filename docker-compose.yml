version: '3.8'
services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: file:/data/prod.db
      SESSION_SECRET: ${SESSION_SECRET:-changeme-please-override}
      NODE_ENV: production
      PORT: 3001
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
